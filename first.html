<!DOCTYPE html>
<html>
<head>
    <title>My Website</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            text-align:center;
            background:#f5f5f5;
            padding:50px;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:10px;
            max-width:500px;
            margin:auto;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        button{
            background:#25D366;
            color:white;
            border:none;
            padding:12px 20px;
            font-size:18px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#1da851;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Welcome to My Website</h1>
    <p>Hi Nazia.</p>

    <button onclick="showMessage()">
        Click Me
    </button>

    <p id="result"></p>
</div>

<script>
function showMessage(){
    document.getElementById("result").innerHTML =
    "You are looking gorgeous today";
}
</script>

</body>
</html>
